<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BrewTech | Login</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css">
  <link rel="icon" href="./assets/icon/favicon2.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="container">
      <h1 class="titulo">Brew<span>Tech</span></h1>
      <ul class="navbar">
        <li>
          <a href="index.html">Inicial</a>
        </li>
        <li>
          <a href="simulador.html">Simulador</a>
        </li>
        <li>|</li>
        <li class="agora">
          <a href="#">Login</a>
        </li>
        <li>
          <a href="cadastro.html">Cadastro</a>
        </li>
      </ul>
    </div>
  </div>

  <!-- LOGIN -->
  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-login">
        <h2>Acessar painel</h2>
        <div class="formulario">
          <div class="campo">
            <span>E-mail</span>
            <input id="email_input" type="text" placeholder="seu@email.com">
          </div>
          <div class="campo">
            <span>Senha</span>
            <input id="senha_input" type="password" placeholder="••••••">
          </div>
          <button class="botao" onclick="entrar()">Entrar</button>
        </div>

        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif">
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="container">
      <h4>Feito com amor por aluno &hearts; SPTech &copy; 2023-2026</h4>
    </div>
  </div>

</body>

</html>

<script>
  function entrar() {
    aguardar();

    var emailVar = email_input.value;
    var senhaVar = senha_input.value;

    if (emailVar == "" || senhaVar == "") {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Preencha e-mail e senha antes de continuar.";
      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    fetch("/usuarios/autenticar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ emailServer: emailVar, senhaServer: senhaVar })
    }).then(function (resposta) {
      if (resposta.ok) {
        resposta.json().then(json => {
          sessionStorage.EMAIL_USUARIO = json.email;
          sessionStorage.NOME_USUARIO  = json.nome;
          sessionStorage.ID_USUARIO    = json.id;
          sessionStorage.TANQUES       = JSON.stringify(json.tanques);
          setTimeout(function () {
            window.location = "./dashboard/cards.html";
          }, 1000);
        });
      } else {
        resposta.text().then(texto => {
          finalizarAguardar(texto);
        });
      }
    }).catch(function (erro) {
      console.log(erro);
    });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
