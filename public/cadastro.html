<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BrewTech | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css">
  <link rel="icon" href="./assets/icon/favicon2.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body onload="listar()">

  <!-- HEADER -->
  <div class="header">
    <div class="container">
      <h1 class="titulo">Brew<span>Tech</span></h1>
      <ul class="navbar">
        <li>
          <a href="index.html">Inicial</a>
        </li>
        <li>
          <a href="simulador.html">Simulador</a>
        </li>
        <li>|</li>
        <li>
          <a href="login.html">Login</a>
        </li>
        <li class="agora">
          <a href="#">Cadastro</a>
        </li>
      </ul>
    </div>
  </div>

  <!-- CADASTRO -->
  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <h2>Criar conta</h2>
        <div class="formulario">
          <div class="campo">
            <span>Código de ativação</span>
            <input id="codigo_input" type="text" placeholder="Código fornecido pela cervejaria">
          </div>
          <div class="campo">
            <span>Nome</span>
            <input id="nome_input" type="text" placeholder="Seu nome completo">
          </div>
          <div class="campo">
            <span>E-mail</span>
            <input id="email_input" type="text" placeholder="seu@email.com">
          </div>
          <div class="campo">
            <span>Senha</span>
            <input id="senha_input" type="password" placeholder="••••••">
          </div>
          <div class="campo">
            <span>Confirmar senha</span>
            <input id="confirmacao_senha_input" type="password" placeholder="••••••">
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>

        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif">
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="container">
      <h4>Feito com amor por aluno &hearts; SPTech &copy; 2023-2026</h4>
    </div>
  </div>

</body>

</html>

<script>
  let listaEmpresasCadastradas = [];

  function cadastrar() {
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var codigoVar = codigo_input.value;
    var idEmpresaVincular;

    if (!nomeVar || !emailVar || !senhaVar || !confirmacaoSenhaVar || !codigoVar) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Preencha todos os campos antes de continuar.";
      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
      if (listaEmpresasCadastradas[i].codigo_ativacao == codigoVar) {
        idEmpresaVincular = listaEmpresasCadastradas[i].id;
        break;
      } else {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "Código de ativação inválido. Verifique com seu responsável.";
        finalizarAguardar();
      }
    }

    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        nomeServer:            nomeVar,
        emailServer:           emailVar,
        senhaServer:           senhaVar,
        idEmpresaVincularServer: idEmpresaVincular
      })
    }).then(function (resposta) {
      if (resposta.ok) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "Conta criada com sucesso! Redirecionando para o login…";
        setTimeout(() => { window.location = "login.html"; }, 2000);
        finalizarAguardar();
      } else {
        throw "Erro ao tentar realizar o cadastro.";
      }
    }).catch(function (resposta) {
      console.log(`#ERRO: ${resposta}`);
      finalizarAguardar();
    });

    return false;
  }

  function listar() {
    fetch("/empresas/listar", { method: "GET" })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
